# Backup-Dienst OHNE eigenen Reverse Proxy — für Server, auf denen schon einer läuft
# (z. B. Traefik oder nginx auf Port 443). Der Container lauscht NUR auf dem
# Docker-Host-Gateway 172.17.0.1:8787, ist also aus dem Internet nicht direkt
# erreichbar — TLS + Routing macht dein bestehender Reverse Proxy.
#
# Start:  cp .env.example .env  (ALLOW_ORIGIN setzen)  &&  docker compose up -d
# Danach im Reverse Proxy einen HTTPS-Host auf  http://172.17.0.1:8787  zeigen lassen
# (Traefik-Beispiel: traefik/backup.yml in den dynamic-Ordner kopieren).
#
# Kein bestehender Proxy? Dann stattdessen  docker-compose.caddy.yml  nutzen
# (bringt Caddy + automatisches Let's-Encrypt-HTTPS mit).

services:
  backup:
    build: .
    restart: unless-stopped
    environment:
      - PORT=8787
      - DATA_DIR=/data
      - ALLOW_ORIGIN=${ALLOW_ORIGIN}
    volumes:
      - ./data:/data
    # Nur ans Docker-Gateway binden -> vom Host & von anderen Containern (Traefik)
    # erreichbar, aber nicht auf der oeffentlichen IP.
    ports:
      - "172.17.0.1:8787:8787"
